id: electron-toplevel-import
language: TypeScript
severity: error
message: |
  Electron モジュール ($IMPORTS) をトップレベルでインポートしないでください。
  Playwright テストがクラッシュします。electron/lib/electronModules.ts の遅延取得ヘルパーを使用してください。
note: |
  参照: .claude/rules/electron-import.md
  ヘルパー: electron/lib/electronModules.ts
  許可ファイル: index.ts, preload.ts
rule:
  pattern: import { $$$IMPORTS } from 'electron'
  not:
    inside:
      kind: function_declaration
      stopBy: end
files:
  - electron/module/**/*.ts
ignores:
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - '**/__tests__/**'
