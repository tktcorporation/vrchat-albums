[package]
name = "exif-native"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", default-features = false, features = ["napi9"] }
napi-derive = "3"
img-parts = "0.3"
roxmltree = "0.20"
rayon = "1.10"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
