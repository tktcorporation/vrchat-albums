name: Build and Release Electron App (Cross Platform)

on:
  push:
    tags:
      - '*'

concurrency:
  group: release

permissions:
  contents: write

jobs:
  vars:
    name: setup vars
    runs-on: ubuntu-22.04
    outputs:
      app-version: ${{ steps.app-version.outputs.version }}
      is-semver-tag: ${{ steps.check-tag-format.outputs.is-semver }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'

      - name: output version
        id: app-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check tag format
        id: check-tag-format
        run: |
          if [[ "${GITHUB_REF##*/}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.* ]]; then
            echo "is-semver=true" >> $GITHUB_OUTPUT
          else
            echo "is-semver=false" >> $GITHUB_OUTPUT
          fi

  draft-release:
    runs-on: ubuntu-latest
    needs: vars
    outputs:
      release_id: ${{ steps.create-release-draft.outputs.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get-version
        uses: battila7/get-version-action@v2

      - name: Extract release notes from CHANGELOG.md
        id: release-notes
        env:
          TAG_NAME: ${{ github.ref_name }}
          IS_SEMVER: ${{ needs.vars.outputs.is-semver-tag }}
        run: |
          # タグ名からバージョンを取得（v0.26.0 → 0.26.0）
          APP_VERSION="${TAG_NAME#v}"

          # CHANGELOG.md から該当バージョンのセクションを抽出
          # changesets 形式: "## X.Y.Z" / git-cliff 形式: "## [X.Y.Z]"
          # 両方に対応し、次の "## " の手前までを取得
          NOTES=$(awk -v ver="$APP_VERSION" '
            /^## / {
              if (found) exit
              if ($0 == "## " ver || $0 == "## [" ver "]" || index($0, "## [" ver "]") == 1) {
                found=1
                next
              }
            }
            found { print }
          ' CHANGELOG.md)

          # semver タグ（正式リリース）ではリリースノート必須
          # 非 semver タグ（build-* 等のドラフトビルド）では空でも許容
          if [[ -z "$NOTES" && "$IS_SEMVER" == "true" ]]; then
            echo "::error::No release notes found in CHANGELOG.md for version: $APP_VERSION"
            exit 1
          fi

          # マルチライン出力を GITHUB_OUTPUT に書き込む
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Delete drafts
        uses: hugo19941994/delete-draft-releases@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.github_token }}

      - name: Create Release Draft
        id: create-release-draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          # v0.0.0 or ref
          name: ${{ needs.vars.outputs.is-semver-tag == 'true' && steps.get-version.outputs.version || github.ref }}
          body: ${{ steps.release-notes.outputs.notes }}

  electron-build:
    name: Build on ${{ matrix.os }}
    needs: [vars, draft-release]
    runs-on: ${{ matrix.os }}
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_RELEASE: ${{ github.sha }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node and Install Dependencies
        uses: ./.github/actions/setup-node-and-install

      - name: Build and Publish Electron App
        env:
          NODE_ENV: production
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOT_DRAFT_RELEASE: 'false'
        run: |
          pnpm clean:build
          pnpm build
          if [[ "${{ needs.vars.outputs.is-semver-tag }}" == 'true' ]]; then
            pnpm exec electron-builder --config=electron-builder.cjs --${{ matrix.os == 'windows-latest' && 'win' || matrix.os == 'ubuntu-22.04' && 'linux' || 'mac' }} --publish always
          else
            pnpm exec electron-builder --config=electron-builder.cjs --${{ matrix.os == 'windows-latest' && 'win' || matrix.os == 'ubuntu-22.04' && 'linux' || 'mac' }} --publish never
            tag_string=$(echo "${GITHUB_REF##*/}" | sed 's/v//')
            echo "tag_string: $tag_string"
            for file in ./dist/*; do
              result=$(gh release upload "$tag_string" "$file" || echo "failed")
              echo "result: $file $result"
            done
          fi

      - name: Upload sourcemaps
        run: pnpm sentry:sourcemaps

  publish-release:
    needs: [vars, draft-release, electron-build]
    runs-on: ubuntu-latest
    if: ${{ needs.vars.outputs.is-semver-tag == 'true' }}
    steps:
      - name: Publish Release
        uses: eregon/publish-release@v1
        with:
          release_id: ${{ needs.draft-release.outputs.release_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
