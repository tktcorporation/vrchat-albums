name: Changeset Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  changeset-check:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changesets
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # changeset release PR はスキップ
          if [[ "$PR_TITLE" == "chore: release" ]]; then
            echo "Release PR detected, skipping changeset check"
            exit 0
          fi

          # main ブランチとの差分でコードファイルが変更されたか確認
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          CODE_CHANGED=false

          for file in $CHANGED_FILES; do
            case "$file" in
              src/*|electron/*|scripts/*|package.json|tsconfig*.json|vite.config.*|electron-builder.*)
                CODE_CHANGED=true
                break
                ;;
            esac
          done

          if [ "$CODE_CHANGED" = "false" ]; then
            echo "No code changes detected, skipping changeset check"
            exit 0
          fi

          # この PR で追加された changeset ファイルがあるかチェック
          # find ではなく git diff を使うことで、過去の PR の changeset が残っていても
          # この PR 固有の changeset がなければ正しく fail する
          PR_CHANGESET_FILES=$(git diff --name-only --diff-filter=A origin/main...HEAD -- '.changeset/*.md' | grep -v 'README.md' | head -1)

          if [ -z "$PR_CHANGESET_FILES" ]; then
            echo "::error::No changeset found in this PR. Run 'pnpm changeset' to create one, or 'pnpm changeset --empty' for changes that don't need a version bump."
            exit 1
          fi

          echo "Changeset found: $PR_CHANGESET_FILES"
