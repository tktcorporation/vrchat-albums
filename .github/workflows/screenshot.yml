name: PR Screenshot Commenter

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  screenshot:
    runs-on: ubuntu-22.04
    permissions:
      contents: write # Changed from read to write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node and Install Dependencies
        uses: ./.github/actions/setup-node-and-install

      # Playwright の browser binary（~150MB）を cache。
      # OS deps（apt 経由）は cache できないので別ステップで毎回入れる。
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (only on cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      # OS deps（libnss3, libatk1.0-0 等）は sudo apt の都合で都度実行が必要。
      # browsers と分離することで cache hit 時の所要時間を大幅短縮。
      - name: Install Playwright OS deps
        run: pnpm exec playwright install-deps chromium

      - name: build app
        run: pnpm build

      - name: Remove old screenshots
        run: rm -rf playwright/previews/*.png

      - name: Setup dummy photos by command
        run: pnpm generate:debug-data

      # test:playwright:ci は build + playwright test のみ（install をスキップ）。
      # 上のステップで browsers / OS deps を準備済みなので二重実行しない。
      - name: Run Playwright tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" -- pnpm test:playwright:ci

      - name: upload screenshot
        id: upload-screenshot
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: playwright/previews/*.png

      - name: Publish screenshot to branch
        id: publish_screenshots
        env:
          BRANCH: pr-screenshots
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SCREENSHOT_DIR="playwright/previews"
          UPLOAD_DIR="upload"
          PR_DIR="${UPLOAD_DIR}/pr-${PR_NUMBER}"

          FINAL_MESSAGE="Screenshots for this PR:"

          mkdir -p "$PR_DIR"

          shopt -s nullglob
          SCREENSHOT_FILES=("$SCREENSHOT_DIR"/*.png)
          shopt -u nullglob

          if [ ${#SCREENSHOT_FILES[@]} -eq 0 ]; then
            echo "No PNG screenshots found in $SCREENSHOT_DIR"
            FINAL_MESSAGE="No screenshots found for this PR."
          else
            echo "Copying screenshots to $PR_DIR:"
            cp "${SCREENSHOT_FILES[@]}" "$PR_DIR/"

            echo "Screenshots in $PR_DIR:"
            ls "$PR_DIR"

            # raw.githubusercontent.com の URL を組み立て
            for FILE in "${SCREENSHOT_FILES[@]}"; do
              BASENAME=$(basename "$FILE")
              ENCODED_FILE=$(printf %s "$BASENAME" | jq -sRr @uri)
              FINAL_MESSAGE="${FINAL_MESSAGE}\\n![${BASENAME}](https://raw.githubusercontent.com/${REPO}/${BRANCH}/pr-${PR_NUMBER}/${ENCODED_FILE})"
            done

            cd "$UPLOAD_DIR"

            # 既存の pr-screenshots ブランチがあれば取得、なければ orphan で作成
            git init -b "$BRANCH"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

            if git fetch origin "$BRANCH" 2>/dev/null; then
              git reset --soft FETCH_HEAD
              # 他の PR のスクショを復元
              git checkout FETCH_HEAD -- . 2>/dev/null || true
              # 今回の PR のスクショを上書き（checkout で古い版に戻された場合の対策）
              cp ../"$SCREENSHOT_DIR"/*.png "pr-${PR_NUMBER}/"

              # クローズ済み PR のディレクトリを削除
              for DIR in pr-*/; do
                CLOSED_PR="${DIR#pr-}"
                CLOSED_PR="${CLOSED_PR%/}"
                if [ "$CLOSED_PR" = "$PR_NUMBER" ]; then
                  continue
                fi
                STATE=$(gh pr view "$CLOSED_PR" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
                if [ "$STATE" = "MERGED" ] || [ "$STATE" = "CLOSED" ]; then
                  echo "Cleaning up screenshots for closed PR #${CLOSED_PR}"
                  rm -rf "$DIR"
                fi
              done
            fi

            git add .

            if ! git diff --staged --quiet; then
              echo "Committing and pushing screenshots..."
              git commit -m "Update screenshots for PR #${PR_NUMBER}"
              git push origin "$BRANCH" --force
            else
              echo "No new screenshots were staged for commit."
            fi
            cd ..
          fi

          {
            echo "screenshot_comment_body<<EOF"
            echo -e "${FINAL_MESSAGE}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Comment with screenshot
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: ${{ steps.publish_screenshots.outputs.screenshot_comment_body }}
          pr_number: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
