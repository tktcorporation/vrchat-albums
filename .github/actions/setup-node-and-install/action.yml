name: 'Setup Node.js and Install Dependencies'
description: 'Common setup for Node.js and dependency installation'
inputs:
  working-directory:
    description: 'Working directory for the installation'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: 'package.json'

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          packages/exif-native/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('packages/exif-native/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        pnpm install --frozen-lockfile

    - name: Build exif-native
      shell: bash
      run: |
        npm install -g @napi-rs/cli
        cd packages/exif-native && napi build --platform
